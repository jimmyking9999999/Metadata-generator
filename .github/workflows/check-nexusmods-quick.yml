name: Check Nexus Mods Metadata Quick

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: update-nexusmods
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Download Mono.Cecil
        shell: pwsh
        run: |
          $packageVersion = "0.11.6"
          $packageUrl = "https://www.nuget.org/api/v2/package/Mono.Cecil/$packageVersion"
          $packagePath = Join-Path $env:RUNNER_TEMP "Mono.Cecil.$packageVersion.nupkg"
          $extractPath = Join-Path $env:RUNNER_TEMP "mono-cecil"

          Invoke-WebRequest -Uri $packageUrl -OutFile $packagePath
          if (Test-Path $extractPath) {
            Remove-Item $extractPath -Recurse -Force
          }

          Expand-Archive -LiteralPath $packagePath -DestinationPath $extractPath
          $cecilDll = Join-Path $extractPath "lib\net40\Mono.Cecil.dll"
          if (-not (Test-Path $cecilDll)) {
            throw "Mono.Cecil.dll not found at $cecilDll"
          }

          "MONO_CECIL_DLL_PATH=$cecilDll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Quick refresh nexusmods.json
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
          MONO_CECIL_DLL_PATH: ${{ env.MONO_CECIL_DLL_PATH }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_RELEASES: ${{ secrets.DISCORD_WEBHOOK_URL_RELEASES }}
        run: npm run update:nexusmods:quick

      - name: Commit and push changes
        run: |
          git diff --quiet -- nexusmods.json
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No nexusmods.json changes detected."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nexusmods.json
          git commit -m "Update nexusmods.json"
          git push
