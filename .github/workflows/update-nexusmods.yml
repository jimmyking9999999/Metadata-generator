name: Update Nexus Mods Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

concurrency:
  group: update-nexusmods
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Refresh nexusmods.json
        env:
          NEXUS_API_KEY: ${{ secrets.NEXUS_API_KEY }}
        run: npm run update:nexusmods

      - name: Commit and push changes
        run: |
          if git diff --quiet -- nexusmods.json; then
            echo "No nexusmods.json changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nexusmods.json
          git commit -m "Update nexusmods.json"
          git push
